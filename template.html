<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>识字冒险岛 · 网页版</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: linear-gradient(160deg, #FFF9F0, #FFE9D6);
    color: #5a3a1a;
    display: flex; justify-content: center;
    overscroll-behavior: none;
  }
  #app {
    width: 100%; max-width: 480px; height: 100dvh;
    display: flex; flex-direction: column;
    background: #FFF9F0; position: relative; overflow: hidden;
    box-shadow: 0 0 40px rgba(255,140,66,.15);
  }
  #topbar {
    height: 52px; flex: 0 0 52px; display: flex; align-items: center; gap: 8px;
    padding: 0 14px; background: #FF8C42; color: #fff; font-weight: 700;
  }
  .back-btn {
    background: rgba(255,255,255,.25); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 50%; font-size: 20px;
    display: none; align-items: center; justify-content: center; cursor: pointer;
  }
  .top-title { font-size: 18px; }
  #main { flex: 1; position: relative; overflow: hidden; }
  .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 18px; }
  .view.active { display: flex; }

  .btn { border: none; border-radius: 18px; padding: 16px; font-size: 18px; font-weight: 700; color: #fff; margin: 8px 0; width: 100%; cursor: pointer; transition: transform .08s; }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: linear-gradient(135deg, #FF8C42, #FF6B35); }
  .btn-game { background: linear-gradient(135deg, #4ECDC4, #2BB3A3); }
  .btn-ghost { background: #fff; color: #FF8C42; border: 2px solid #FF8C42; }
  .btn-col { display: flex; flex-direction: column; margin-top: 10px; }
  .assess-speaker { display: block; margin: 14px auto; width: 100px; height: 100px; border-radius: 50%; border: none; background: linear-gradient(135deg, #FF8C42, #FF6B35); color: #fff; font-size: 48px; cursor: pointer; box-shadow: 0 8px 22px rgba(255,140,66,.35); animation: spk-pulse 1.4s ease-in-out infinite; }
  .assess-speaker:active { transform: scale(.93); }
  @keyframes spk-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .hero { text-align: center; margin-top: 18px; }
  .mascot-big { font-size: 80px; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .hero h1 { font-size: 30px; margin: 10px 0 4px; color: #FF6B35; }
  .subtitle { color: #a87b4f; margin: 0; }
  .progress-card { display: flex; justify-content: space-around; background: #fff; border-radius: 20px; padding: 14px; margin: 20px 0; box-shadow: 0 6px 18px rgba(255,140,66,.12); }
  .pc-item { display: flex; flex-direction: column; align-items: center; }
  .pc-num { font-size: 26px; font-weight: 800; color: #FF8C42; }
  .pc-label { font-size: 12px; color: #a87b4f; }
  .hint { text-align: center; color: #b08a5e; font-size: 13px; margin-top: 14px; }

  .quiz-head { margin-bottom: 14px; }
  .progress-track { height: 10px; background: #ffe3cc; border-radius: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #FF8C42; transition: width .3s; }
  .quiz-count { text-align: right; font-size: 13px; color: #a87b4f; margin-top: 6px; }
  .speak-big { display: block; margin: 10px auto; background: #FFE9D6; border: 2px solid #FF8C42; color: #FF6B35; border-radius: 50px; padding: 14px 26px; font-size: 18px; font-weight: 700; cursor: pointer; }
  .quiz-tip { text-align: center; color: #a87b4f; }
  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
  .opt { aspect-ratio: 1/1; border: none; border-radius: 22px; background: #fff; font-size: 46px; font-weight: 800; color: #5a3a1a; box-shadow: 0 6px 14px rgba(255,140,66,.15); cursor: pointer; transition: transform .08s; }
  .opt:active { transform: scale(.94); }
  .opt.correct { background: #95E1A3; color: #fff; }
  .opt.wrong { background: #FF6B6B; color: #fff; }
  .opt:disabled { cursor: default; }

  .game-hud { display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
  .hud-lives { font-size: 22px; letter-spacing: 2px; }
  .hud-time { color: #FF6B35; font-weight: 800; font-size: 17px; min-width: 56px; text-align: center; }
  .hud-score b { color: #FF6B35; font-size: 20px; }
  .hud-combo { color: #2BB3A3; font-weight: 800; }
  .game-target { text-align: center; margin: 10px 0; font-size: 20px; }
  .gt-char { font-size: 40px; font-weight: 800; color: #FF6B35; }
  .gt-sub { font-size: 13px; color: #a87b4f; margin-top: 4px; }
  .speak-small { background: #FFE9D6; border: 2px solid #FF8C42; color: #FF6B35; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; margin-left: 8px; cursor: pointer; vertical-align: middle; }
  .game-field { position: relative; flex: 1; overflow: hidden; background: radial-gradient(circle at 50% 0, #FFF3E6, #FFF9F0); border-radius: 20px; margin-top: 8px; min-height: 240px; }
  .falling-char { position: absolute; top: -12%; font-size: 40px; font-weight: 800; color: #5a3a1a; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 14px; box-shadow: 0 4px 10px rgba(255,140,66,.25); cursor: pointer; animation-name: fall; animation-timing-function: linear; animation-fill-mode: forwards; }
  @keyframes fall { from { top: -12%; } to { top: 100%; } }
  .falling-char.pop-correct { background: #95E1A3; color: #fff; }
  .falling-char.pop-wrong { background: #FF6B6B; color: #fff; }

  .result-card { text-align: center; margin: auto; }
  .result-card h2 { color: #FF6B35; }
  .result-lines p { font-size: 17px; margin: 6px 0; }
  .result-praise { color: #2BB3A3; font-weight: 700; font-size: 18px; }

  .lv-title { text-align: center; color: #FF6B35; }
  .cat-toggle { display: flex; gap: 8px; margin: 6px 0 4px; }
  .cat-btn { flex: 1; border: 2px solid #FF8C42; background: #fff; color: #FF8C42; border-radius: 14px; padding: 11px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .12s; }
  .cat-btn.on { background: #FF8C42; color: #fff; }
  .lv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
  .lv-cell { aspect-ratio: 1/1; border: none; border-radius: 16px; background: #fff; box-shadow: 0 4px 10px rgba(255,140,66,.12); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 4px; }
  .lv-cell.locked { background: #f0e6da; color: #bba; cursor: default; }
  .lv-num { font-size: 20px; font-weight: 800; color: #FF8C42; }
  .lv-sample { font-size: 11px; color: #a87b4f; margin-top: 4px; text-align: center; line-height: 1.2; }

  #mascot-toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%) translateY(20px); background: rgba(255,255,255,.96); border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(0,0,0,.15); opacity: 0; pointer-events: none; transition: all .25s; z-index: 50; }
  #mascot-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .mt-emoji { font-size: 28px; }
  .mt-text { font-weight: 700; color: #FF6B35; }
  #confetti-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 40; }
  .confetti { position: absolute; top: -20px; width: 10px; height: 14px; border-radius: 3px; animation-name: confetti-fall; }
  @keyframes confetti-fall { to { transform: translateY(110vh) rotate(540deg); opacity: .3; } }
  #sound-hint { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .2s; z-index: 60; pointer-events: none; }
  #sound-hint.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="btn-back" class="back-btn">←</button>
    <span class="top-title">🦊 识字冒险岛</span>
  </header>
  <main id="main">
    <section id="view-home" class="view"></section>
    <section id="view-assess" class="view"></section>
    <section id="view-game" class="view"></section>
    <section id="view-result" class="view"></section>
    <section id="view-level" class="view"></section>
  </main>
  <div id="mascot-toast"></div>
  <div id="confetti-layer"></div>
  <div id="sound-hint"></div>
</div>
<script>var DICT = __DICT__;</script>
<script>__APP_JS__</script>
</body>
</html>
